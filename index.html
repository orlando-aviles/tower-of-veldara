<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VFA – Prologue</title>
<link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<!-- ===== FIELD LAYER ===== -->
<div id="wrap">
  <canvas id="c"></canvas>
</div>

<!-- ===== FIELD HUD ===== -->
<div id="fieldHud">
  <div id="fieldDepth">Depth 1</div>
  <div id="fieldXP">Lv1 · 0/30 XP</div>
</div>

<!-- ===== FIELD MENU BUTTON ===== -->
<div id="fieldMenuBtn">☰</div>

<!-- ===== FIELD MENU OVERLAY ===== -->
<div id="fieldMenu">
  <div id="fieldMenuCard">
    <div id="fieldMenuTitle">— Field Menu —</div>
    <div id="fieldMenuParty"></div>
    <div id="fieldMenuActions">
      <button class="fmBtn" id="fieldMenuClose">Resume</button>
    </div>
    <div id="fieldMenuHint">Q / E — shift paradigm in combat</div>
  </div>
</div>

<!-- ===== DEPTH TRANSITION ===== -->
<div id="depthTransition">
  <div id="depthTransitionText">Entering Depth 2</div>
</div>

<!-- ===== COMBAT SCENE ===== -->
<div id="combatScene">

  <!-- FULLSCREEN BATTLEFIELD -->
  <canvas id="battleStage"></canvas>

  <!-- ENEMY HUD -->
  <div id="enemyHud">
    <div class="enemyName">—</div>

    <div class="hudBar hp">
      <div class="hudFill" id="enemy-hp"></div>
    </div>

    <div class="hudBar atb">
      <div class="hudFill" id="enemy-atb"></div>
    </div>

    <div class="hudBar chain">
      <div class="hudFill" id="enemy-chain"></div>
    </div>

    <div id="staggerTag">STAGGER</div>
  </div>

  <!-- PARADIGM DISPLAY -->
  <div id="paradigmHud">
    <div id="hudParadigmName"></div>
    <div id="hudParadigmRoles"></div>

    <div class="shiftBtns">
      <button id="shiftPrev">◀</button>
      <button id="shiftNext">▶</button>
      <button id="escapeCombat">Run</button>
    </div>
  </div>

  <!-- PARTY HUD -->
  <div id="partyHud"></div>

  <!-- COMBAT FX LAYER -->
  <div id="combatFx"></div>

  <!-- COMBAT LOG -->
  <div id="log"></div>

</div>

<script src="js/core/main.js" type="module"></script>

</body>
</html>
